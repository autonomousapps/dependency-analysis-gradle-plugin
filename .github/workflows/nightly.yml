# Borrowed from https://github.com/gradle/gradle-build-action
name: Test latest Gradle RC

on:
  schedule:
    - cron: 0 0 * * * # daily
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false

jobs:
  gradle-rc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # 6.1.0
        with:
          gradle-version: release-candidate

      # just test build configuration
      - name: Gradle dry run (main)
        run: './gradlew build --dry-run'

      - name: Gradle dry run (testkit)
        run: './gradlew -p testkit/ build --dry-run'
